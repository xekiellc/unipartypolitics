name: UniParty Politics Pipeline

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fetch pipeline
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch.js

      - name: Commit updated articles.json
        run: |
          git config user.name "uniparty-bot"
          git config user.email "bot@unipartypolitics.com"
          git add data/articles.json
          git diff --staged --quiet || git commit -m "Pipeline update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Post to Voxxee
        run: |
          curl -s -X POST https://xenchee.netlify.app/.netlify/functions/pipeline-post \
            -H "Content-Type: application/json" \
            -H "x-pipeline-secret: ${{ secrets.PIPELINE_SECRET }}" \
            -d '{
              "slug": "uniparty-politics",
              "title": "🏛️ UniParty Politics — Red Team. Blue Team. Same Owners.",
              "summary": "Political watchdog news exposing the uniparty consensus across both sides of the aisle.",
              "url": "https://unipartypolitics.com"
            }'
